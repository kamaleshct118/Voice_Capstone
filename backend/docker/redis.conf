# Redis configuration for Voice Medical Assistant

# Persistence
save 900 1
save 300 10
appendonly yes

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Databases
# DB0 — conversation history & health logs (no TTL enforced here; app sets per-key TTL)
# DB1 — tool retrieval cache / Cache-Augmented Generation (24h TTL via app)
databases 16
