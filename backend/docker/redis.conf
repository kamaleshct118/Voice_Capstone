# Redis configuration for Voice Medical Assistant

# ── Persistence Configuration ──────────────────────────────────────
# RDB Snapshots (backup)
# Save if at least 1 key changed in 900 seconds
save 900 1
# Save if at least 10 keys changed in 300 seconds
save 300 10
# Save if at least 10000 keys changed in 60 seconds
save 60 10000

# AOF (Append Only File) - Primary persistence mechanism
appendonly yes
appendfilename "appendonly.aof"
# Sync to disk every second (good balance)
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF load truncated - handle corrupted AOF files gracefully
aof-load-truncated yes

# ── Memory Configuration ───────────────────────────────────────────
maxmemory 256mb
# Evict least recently used keys when memory limit reached
maxmemory-policy allkeys-lru

# ── Database Configuration ─────────────────────────────────────────
# DB0 — Conversation Cache (48h TTL)
#   - ctx:{session_id} → conversation history
#   - health:{session_id} → health log entries
#   - healthchat:{session_id} → health chat history
#
# DB1 — Tool Retrieval Cache (54h TTL)
#   - SHA256 hashes → cached tool responses
#   - medicine_info:{hash} → medicine classifications
#   - medical_news:{hash} → news articles
#   - medical_info:{hash} → OpenFDA drug data
databases 16

# ── Logging ────────────────────────────────────────────────────────
loglevel notice
